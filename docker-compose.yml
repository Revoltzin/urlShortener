services:
  postgres:
    image: postgres:16
    container_name: postgres_app
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports: 
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    restart: unless-stopped

volumes:
  postgres_data: